<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Brain</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --primary: #5b5bd6;
      --primary-light: #ebebff;
      --text: #1a1a2e;
      --muted: #8a8a9a;
      --border: #e5e5ea;
      --radius: 14px;
      --psychiatry:    #1565c0; --psychiatry-bg:    #e3f2fd;
      --psychotherapy: #4527a0; --psychotherapy-bg: #ede7f6;
      --icu:           #b71c1c; --icu-bg:           #ffebee;
      --business:      #2e7d32; --business-bg:      #e8f5e9;
      --resources:     #6a1b9a; --resources-bg:     #f3e5f5;
      --personal:      #880e4f; --personal-bg:      #fce4ec;
      --lifestyle:     #00796b; --lifestyle-bg:     #e0f2f1;
    }
    html, body { height: 100%; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--text); }

    /* ── Login ── */
    #login-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100dvh; padding:24px; gap:16px; }
    #login-screen .logo { font-size:52px; }
    #login-screen h1 { font-size:30px; font-weight:700; }
    #login-screen p { color:var(--muted); font-size:15px; text-align:center; }
    #login-screen input { width:100%; max-width:320px; padding:14px 16px; border:1.5px solid var(--border); border-radius:12px; font-size:16px; outline:none; }
    #login-screen input:focus { border-color:var(--primary); }
    #login-screen button { width:100%; max-width:320px; padding:14px; background:var(--primary); color:white; border:none; border-radius:12px; font-size:16px; font-weight:600; cursor:pointer; }
    #login-error { color:#e53935; font-size:14px; display:none; }

    /* ── App shell ── */
    #app { display:none; flex-direction:column; height:100dvh; }

    /* ── Tab bar ── */
    #tab-bar { display:flex; background:var(--surface); border-top:1px solid var(--border); flex-shrink:0; padding-bottom:env(safe-area-inset-bottom); }
    .tab { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:10px 0 8px; gap:3px; cursor:pointer; font-size:11px; color:var(--muted); border:none; background:none; }
    .tab.active { color:var(--primary); }
    .tab svg { width:22px; height:22px; }
    .tab.active svg { stroke:var(--primary); }
    .tab svg { stroke:var(--muted); fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }

    /* ── Pages ── */
    .page { display:none; flex:1; flex-direction:column; overflow:hidden; }
    .page.active { display:flex; }

    /* ── Profile page ── */
    #profile-page { background:var(--bg); }
    #profile-list { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
    .profile-card { background:var(--surface); border-radius:var(--radius); padding:16px; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
    .profile-card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
    .profile-section-title { font-size:15px; font-weight:700; color:var(--text); }
    .profile-section-icon { font-size:20px; }
    .profile-content { font-size:14px; color:var(--muted); line-height:1.6; white-space:pre-wrap; min-height:20px; }
    .profile-content.empty { font-style:italic; }
    .profile-edit-area { width:100%; border:1.5px solid var(--border); border-radius:12px; padding:12px; font-size:14px; font-family:inherit; line-height:1.6; min-height:80px; outline:none; resize:vertical; margin-top:8px; display:none; }
    .profile-edit-area:focus { border-color:var(--primary); }
    .profile-btn-row { display:flex; gap:8px; margin-top:8px; display:none; }
    .profile-save-btn { flex:1; padding:10px; background:var(--primary); color:white; border:none; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; }
    .profile-cancel-btn { padding:10px 16px; background:var(--bg); border:none; border-radius:10px; font-size:14px; color:var(--muted); cursor:pointer; }
    .profile-edit-btn { background:none; border:1px solid var(--border); border-radius:8px; padding:5px 12px; font-size:12px; color:var(--muted); cursor:pointer; }

    /* ── Header ── */
    .page-header { background:var(--surface); border-bottom:1px solid var(--border); padding:14px 20px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .page-header h1 { font-size:18px; font-weight:700; }
    .page-header .subtitle { font-size:12px; color:var(--muted); }
    .header-left { display:flex; align-items:center; gap:10px; }
    .sign-out { background:none; border:1px solid var(--border); border-radius:8px; padding:6px 12px; font-size:13px; color:var(--muted); cursor:pointer; }

    /* ── Chat page ── */
    #messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; -webkit-overflow-scrolling:touch; }
    .msg { display:flex; flex-direction:column; max-width:82%; gap:4px; }
    .msg.user  { align-self:flex-end; align-items:flex-end; }
    .msg.brain { align-self:flex-start; align-items:flex-start; }
    .bubble { padding:10px 14px; border-radius:var(--radius); font-size:15px; line-height:1.5; white-space:pre-wrap; word-break:break-word; }
    .msg.user  .bubble { background:var(--primary); color:white; border-bottom-right-radius:4px; }
    .msg.brain .bubble { background:var(--surface); color:var(--text); border-bottom-left-radius:4px; box-shadow:0 1px 4px rgba(0,0,0,0.07); }
    .msg-meta { font-size:11px; color:var(--muted); padding:0 4px; }
    .typing .bubble { display:flex; align-items:center; gap:4px; padding:12px 16px; }
    .dot { width:7px; height:7px; border-radius:50%; background:var(--muted); animation:bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay:.2s; }
    .dot:nth-child(3) { animation-delay:.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
    .dashboard { background:var(--surface); border-radius:16px; padding:16px 18px; margin:8px 0; border:1px solid var(--border); }
    .dashboard-date { font-size:13px; color:var(--muted); margin-bottom:10px; }
    .dashboard-greeting { font-size:17px; font-weight:700; color:var(--text); margin-bottom:12px; }
    .stats-row { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
    .stat-chip { background:var(--bg); border:1.5px solid var(--border); border-radius:20px; padding:5px 12px; font-size:12px; font-weight:600; color:var(--muted); cursor:pointer; transition:all .15s; }
    .stat-chip:hover { opacity:.8; }
    .stat-chip span { font-size:14px; }
    .stat-chip.all { border-color:var(--primary); color:var(--primary); }
    .stat-chip.all span { color:var(--primary); }
    .quote-card { background:var(--primary-light); border-radius:12px; padding:12px 14px; font-size:13px; color:#444; line-height:1.6; font-style:italic; border-left:3px solid var(--primary); }
    #input-bar { background:var(--surface); border-top:1px solid var(--border); padding:12px 16px; padding-bottom:max(12px,env(safe-area-inset-bottom)); display:flex; flex-direction:column; gap:8px; flex-shrink:0; }
    #input-row { display:flex; align-items:flex-end; gap:10px; }
    #input { flex:1; border:1.5px solid var(--border); border-radius:20px; padding:10px 16px; font-size:16px; font-family:inherit; resize:none; outline:none; max-height:120px; line-height:1.4; background:var(--bg); }
    #input:focus { border-color:var(--primary); background:white; }
    #input::placeholder { color:var(--muted); }
    #send-btn { width:42px; height:42px; border-radius:50%; background:var(--primary); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    #send-btn:disabled { opacity:.4; cursor:default; }
    #send-btn svg { fill:white; stroke:none; }
    #attach-btn { width:42px; height:42px; border-radius:50%; background:var(--bg); border:1.5px solid var(--border); cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:18px; }
    #quick-actions { display:flex; gap:8px; flex-wrap:wrap; }
    .quick-btn { background:var(--primary-light); color:var(--primary); border:1.5px solid var(--primary); border-radius:20px; padding:6px 14px; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; }
    .quick-btn:hover { background:var(--primary); color:white; }
    #file-preview { display:none; align-items:center; gap:8px; background:var(--primary-light); border-radius:10px; padding:8px 12px; font-size:13px; color:var(--primary); }
    #file-preview span { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    #file-preview button { background:none; border:none; cursor:pointer; color:var(--primary); font-size:16px; padding:0; }

    /* ── Notes page ── */
    #notes-page { background:var(--bg); }
    .category-scroll { display:flex; gap:8px; padding:14px 16px; overflow-x:auto; flex-shrink:0; background:var(--surface); border-bottom:1px solid var(--border); -webkit-overflow-scrolling:touch; scrollbar-width:none; }
    .category-scroll::-webkit-scrollbar { display:none; }
    .cat-pill { padding:7px 14px; border-radius:20px; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; border:1.5px solid transparent; background:var(--bg); color:var(--muted); }
    .cat-pill.active { background:var(--primary); color:white; }
    .cat-pill.psychiatry    { border-color:var(--psychiatry);    color:var(--psychiatry); }
    .cat-pill.psychotherapy { border-color:var(--psychotherapy); color:var(--psychotherapy); }
    .cat-pill.business      { border-color:var(--business);      color:var(--business); }
    .cat-pill.resources     { border-color:var(--resources);     color:var(--resources); }
    .cat-pill.personal      { border-color:var(--personal);      color:var(--personal); }
    .cat-pill.psychiatry.active    { background:var(--psychiatry);    border-color:var(--psychiatry);    color:white; }
    .cat-pill.psychotherapy.active { background:var(--psychotherapy); border-color:var(--psychotherapy); color:white; }
    .cat-pill.business.active      { background:var(--business);      border-color:var(--business);      color:white; }
    .cat-pill.resources.active     { background:var(--resources);     border-color:var(--resources);     color:white; }
    .cat-pill.personal.active      { background:var(--personal);      border-color:var(--personal);      color:white; }
    .cat-pill.lifestyle { border-color:var(--lifestyle); color:var(--lifestyle); }
    .cat-pill.lifestyle.active { background:var(--lifestyle); border-color:var(--lifestyle); color:white; }
    .badge.lifestyle { background:var(--lifestyle-bg); color:var(--lifestyle); }
    .cat-pill.icu { border-color:var(--icu); color:var(--icu); }
    .cat-pill.icu.active { background:var(--icu); border-color:var(--icu); color:white; }
    .badge.icu { background:var(--icu-bg); color:var(--icu); }
    #subcat-row { display:none; gap:6px; padding:10px 16px; overflow-x:auto; flex-shrink:0; background:var(--bg); border-bottom:1px solid var(--border); -webkit-overflow-scrolling:touch; scrollbar-width:none; }
    #subcat-row::-webkit-scrollbar { display:none; }
    #subcat-row.visible { display:flex; }
    .subcat-pill { padding:5px 12px; border-radius:20px; font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap; border:1.5px solid var(--border); background:var(--surface); color:var(--muted); }
    .subcat-pill.active { background:var(--text); color:white; border-color:var(--text); }
    .note-subcat { font-size:11px; color:var(--muted); margin-top:2px; }
    .tag { cursor:pointer; transition:background .15s; }
    .tag:hover { background:var(--primary-light); color:var(--primary); }
    #tag-filter-bar { display:none; align-items:center; gap:8px; padding:10px 16px; background:#ebebff; border-bottom:1px solid var(--border); flex-shrink:0; }
    #tag-filter-bar.visible { display:flex; }
    #tag-filter-label { font-size:13px; font-weight:600; color:var(--primary); flex:1; }
    #tag-filter-clear { background:none; border:none; cursor:pointer; font-size:18px; color:var(--primary); padding:0; }

    #notes-list { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; -webkit-overflow-scrolling:touch; }
    .note-card { background:var(--surface); border-radius:var(--radius); padding:16px; box-shadow:0 1px 4px rgba(0,0,0,0.06); cursor:pointer; }
    .note-card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
    .delete-btn { background:none; border:none; cursor:pointer; padding:4px 6px; border-radius:8px; color:var(--muted); font-size:16px; line-height:1; }
    .delete-btn:hover { background:#fce4ec; color:#c62828; }
    .badge { display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.3px; }
    .badge.psychiatry    { background:var(--psychiatry-bg);    color:var(--psychiatry); }
    .badge.psychotherapy { background:var(--psychotherapy-bg); color:var(--psychotherapy); }
    .badge.business      { background:var(--business-bg);      color:var(--business); }
    .badge.resources     { background:var(--resources-bg);     color:var(--resources); }
    .badge.personal      { background:var(--personal-bg);      color:var(--personal); }
    .note-date { font-size:11px; color:var(--muted); }
    .note-summary { font-size:15px; font-weight:600; margin-bottom:6px; line-height:1.4; }
    .note-content { font-size:13px; color:var(--muted); line-height:1.5; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
    .note-tags { display:flex; flex-wrap:wrap; gap:5px; margin-top:10px; }
    .tag { padding:2px 8px; background:var(--bg); border-radius:10px; font-size:11px; color:var(--muted); }
    .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; gap:12px; color:var(--muted); padding:40px; text-align:center; }
    .empty-state .icon { font-size:48px; }
    .empty-state p { font-size:15px; line-height:1.5; }
    .loading-notes { display:flex; align-items:center; justify-content:center; flex:1; color:var(--muted); font-size:15px; }

    /* ── Note detail modal ── */
    #note-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:100; align-items:flex-end; }
    #note-modal.open { display:flex; }
    .modal-sheet { background:var(--surface); border-radius:20px 20px 0 0; width:100%; max-height:80dvh; overflow-y:auto; padding:20px; }
    .modal-handle { width:40px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 16px; }
    .modal-badge-row { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
    .modal-date { font-size:12px; color:var(--muted); }
    .modal-title { font-size:18px; font-weight:700; margin-bottom:12px; }
    .modal-body { font-size:15px; line-height:1.6; white-space:pre-wrap; color:var(--text); word-break:break-word; }
    .modal-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:16px; }
    .modal-close { position:sticky; bottom:0; width:100%; margin-top:20px; padding:14px; background:var(--bg); border:none; border-radius:12px; font-size:16px; font-weight:600; color:var(--text); cursor:pointer; }
    .modal-edit-btn { width:100%; margin-top:10px; padding:14px; background:var(--primary-light); border:none; border-radius:12px; font-size:16px; font-weight:600; color:var(--primary); cursor:pointer; }
    .modal-save-btn { width:100%; margin-top:10px; padding:14px; background:var(--primary); border:none; border-radius:12px; font-size:16px; font-weight:600; color:white; cursor:pointer; }
    .modal-cancel-btn { width:100%; margin-top:8px; padding:14px; background:var(--bg); border:none; border-radius:12px; font-size:16px; font-weight:600; color:var(--muted); cursor:pointer; }
    .edit-field { width:100%; border:1.5px solid var(--border); border-radius:12px; padding:12px 14px; font-size:15px; font-family:inherit; line-height:1.6; resize:vertical; min-height:120px; outline:none; margin-top:8px; }
    .edit-field:focus { border-color:var(--primary); }
    .edit-label { font-size:13px; font-weight:600; color:var(--muted); margin-top:14px; display:block; }
    .format-toolbar { display:flex; gap:5px; margin-top:8px; flex-wrap:wrap; }
    .fmt-btn { padding:5px 11px; border:1.5px solid var(--border); border-radius:8px; background:var(--bg); font-size:13px; cursor:pointer; font-family:inherit; }
    .fmt-btn.bold { font-weight:700; }
    .fmt-btn.underline { text-decoration:underline; }
    .fmt-btn:active { opacity:0.7; }
    .fmt-divider { width:1px; background:var(--border); margin:2px 2px; }
    .color-dot { display:inline-block; width:14px; height:14px; border-radius:50%; border:1.5px solid rgba(0,0,0,0.15); vertical-align:middle; }
    .fmt-select { padding:5px 6px; border:1.5px solid var(--border); border-radius:8px; background:var(--bg); font-size:13px; cursor:pointer; font-family:inherit; }
    #edit-content { width:100%; border:1.5px solid var(--border); border-radius:12px; padding:12px 14px; font-size:15px; font-family:inherit; line-height:1.6; min-height:160px; outline:none; margin-top:8px; overflow-y:auto; white-space:pre-wrap; word-break:break-word; color:var(--text); }
    #edit-content:focus { border-color:var(--primary); }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="logo">🧠</div>
  <h1>Brain</h1>
  <p>Your personal AI note team</p>
  <input type="password" id="pw-input" placeholder="Enter your password" autocomplete="current-password">
  <button onclick="doLogin()">Sign In</button>
  <span id="login-error">Wrong password. Try again.</span>
</div>

<!-- App -->
<div id="app">

  <!-- Chat Page -->
  <div class="page active" id="chat-page">
    <div class="page-header">
      <div class="header-left">
        <span style="font-size:22px">🧠</span>
        <div><div style="font-size:18px;font-weight:700">Brain</div><div class="subtitle">Your AI note team</div></div>
      </div>
      <button class="sign-out" onclick="doLogout()">Sign out</button>
    </div>
    <div id="messages">
      <div class="dashboard" id="dashboard">
        <div class="dashboard-date" id="dash-date"></div>
        <div class="dashboard-greeting">Good to see you, Hannah 👋</div>
        <div class="stats-row" id="dash-stats"><div class="stat-chip">Loading...</div></div>
        <div class="quote-card" id="dash-quote" style="display:none"></div>
      </div>
    </div>
    <div id="input-bar">
      <div id="file-preview">
        <span id="file-name"></span>
        <button onclick="clearFile()">✕</button>
      </div>
      <div id="quick-actions">
        <button class="quick-btn" onclick="startQuiz('psychiatry')">🧠 Quiz: Psychiatry</button>
        <button class="quick-btn" onclick="startQuiz('psychotherapy')">💬 Quiz: Psychotherapy</button>
        <button class="quick-btn" onclick="startQuiz('icu')">🏥 Quiz: ICU</button>
      </div>
      <div id="input-row">
        <button id="attach-btn" onclick="$('file-input').click()" title="Attach file">📎</button>
        <textarea id="input" placeholder="Tell me something, paste a screenshot, or attach a file..." rows="1"></textarea>
        <button id="send-btn" onclick="sendMessage()" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
      <input type="file" id="file-input" accept=".pdf,.xlsx,.xls,.docx,.doc,.pptx,.ppt,.csv,image/*,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/msword,application/vnd.openxmlformats-officedocument.presentationml.presentation,application/vnd.ms-powerpoint,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,text/csv" style="display:none" onchange="handleFileSelect(this.files[0])">
    </div>
  </div>

  <!-- Notes Page -->
  <div class="page" id="notes-page">
    <div class="page-header">
      <div><div style="font-size:18px;font-weight:700">My Notes</div><div class="subtitle" id="notes-count">Loading...</div></div>
      <button class="sign-out" onclick="loadNotes()">Refresh</button>
    </div>
    <div class="category-scroll">
      <div class="cat-pill active" data-cat="all" onclick="filterNotes('all')">All</div>
      <div class="cat-pill psychiatry"    data-cat="psychiatry"    onclick="filterNotes('psychiatry')">Psychiatry</div>
      <div class="cat-pill psychotherapy" data-cat="psychotherapy" onclick="filterNotes('psychotherapy')">Psychotherapy</div>
      <div class="cat-pill icu"           data-cat="icu"           onclick="filterNotes('icu')">ICU</div>
      <div class="cat-pill business"      data-cat="business"      onclick="filterNotes('business')">Business</div>
      <div class="cat-pill resources"     data-cat="resources"     onclick="filterNotes('resources')">Resources</div>
      <div class="cat-pill personal"      data-cat="personal"      onclick="filterNotes('personal')">Personal</div>
      <div class="cat-pill lifestyle"     data-cat="lifestyle"     onclick="filterNotes('lifestyle')">Lifestyle</div>
    </div>
    <div id="subcat-row"></div>
    <div id="tag-filter-bar">
      <span id="tag-filter-label"></span>
      <button id="tag-filter-clear" onclick="clearTagFilter()" title="Clear tag filter">✕</button>
    </div>
    <div id="notes-list"></div>
  </div>

  <!-- Profile Page -->
  <div class="page" id="profile-page">
    <div class="page-header">
      <div><div style="font-size:18px;font-weight:700">My Profile</div><div class="subtitle">Brain uses this to know you</div></div>
      <button class="sign-out" onclick="loadProfile()">Refresh</button>
    </div>
    <div id="profile-list"></div>
  </div>

  <!-- Tab Bar -->
  <div id="tab-bar">
    <button class="tab active" onclick="showTab('chat')">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Chat
    </button>
    <button class="tab" onclick="showTab('notes')">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      Notes
    </button>
    <button class="tab" onclick="showTab('profile')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      Profile
    </button>
  </div>
</div>

<!-- Note Detail Modal -->
<div id="note-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-badge-row">
      <span class="badge" id="modal-badge"></span>
      <span class="modal-date" id="modal-date"></span>
    </div>

    <!-- View mode -->
    <div id="modal-view">
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-tags" id="modal-tags"></div>
      <button class="modal-edit-btn" onclick="startEdit()">Edit</button>
      <button class="modal-close" onclick="closeModal()">Close</button>
    </div>

    <!-- Edit mode -->
    <div id="modal-edit" style="display:none">
      <span class="edit-label">Heading</span>
      <input id="edit-summary" class="edit-field" style="min-height:unset;height:44px" type="text" placeholder="Short, catchy heading (3-6 words)">
      <span class="edit-label">Category</span>
      <select id="edit-category" class="edit-field" style="min-height:unset;height:44px" onchange="updateSubcatOptions()">
        <option value="psychiatry">Psychiatry</option>
        <option value="psychotherapy">Psychotherapy</option>
        <option value="icu">ICU</option>
        <option value="business">Business</option>
        <option value="resources">Resources</option>
        <option value="personal">Personal</option>
        <option value="lifestyle">Lifestyle</option>
      </select>
      <span class="edit-label">Subcategory</span>
      <select id="edit-subcategory" class="edit-field" style="min-height:unset;height:44px"></select>
      <span class="edit-label">Content</span>
      <div class="format-toolbar">
        <button class="fmt-btn bold" onclick="fmt('bold')" title="Bold">B</button>
        <button class="fmt-btn underline" onclick="fmt('underline')" title="Underline">U</button>
        <div class="fmt-divider"></div>
        <select class="fmt-select" onchange="fmtFont(this.value); this.selectedIndex=0;" title="Font">
          <option value="">Font</option>
          <option value="-apple-system,sans-serif">Default</option>
          <option value="Georgia,serif">Georgia</option>
          <option value="'Times New Roman',serif">Times New Roman</option>
          <option value="Arial,sans-serif">Arial</option>
          <option value="'Courier New',monospace">Courier</option>
        </select>
        <select class="fmt-select" onchange="fmtSize(this.value); this.selectedIndex=0;" title="Font size">
          <option value="">Size</option>
          <option value="1">Small</option>
          <option value="3">Default</option>
          <option value="4">Large</option>
          <option value="5">X-Large</option>
        </select>
        <div class="fmt-divider"></div>
        <button class="fmt-btn" onclick="fmtColor('#1a1a2e')" title="Black"><span class="color-dot" style="background:#1a1a2e"></span></button>
        <button class="fmt-btn" onclick="fmtColor('#1565c0')" title="Blue"><span class="color-dot" style="background:#1565c0"></span></button>
        <button class="fmt-btn" onclick="fmtColor('#2e7d32')" title="Green"><span class="color-dot" style="background:#2e7d32"></span></button>
        <button class="fmt-btn" onclick="fmtColor('#b71c1c')" title="Red"><span class="color-dot" style="background:#b71c1c"></span></button>
        <button class="fmt-btn" onclick="fmtColor('#6a1b9a')" title="Purple"><span class="color-dot" style="background:#6a1b9a"></span></button>
        <div class="fmt-divider"></div>
        <button class="fmt-btn" onclick="fmtHighlight('#fff176')" title="Yellow highlight"><span class="color-dot" style="background:#fff176"></span></button>
        <button class="fmt-btn" onclick="fmtHighlight('#b9f6ca')" title="Green highlight"><span class="color-dot" style="background:#b9f6ca"></span></button>
        <button class="fmt-btn" onclick="fmtHighlight('#bbdefb')" title="Blue highlight"><span class="color-dot" style="background:#bbdefb"></span></button>
        <button class="fmt-btn" onclick="fmtHighlight('#f8bbd0')" title="Pink highlight"><span class="color-dot" style="background:#f8bbd0"></span></button>
        <button class="fmt-btn" onclick="fmtHighlight('#ffe0b2')" title="Orange highlight"><span class="color-dot" style="background:#ffe0b2"></span></button>
        <button class="fmt-btn" onclick="fmtHighlight('transparent')" title="Remove highlight">✕HL</button>
      </div>
      <div id="edit-content" contenteditable="true"></div>
      <button class="modal-save-btn" onclick="saveEdit()">Save Changes</button>
      <button class="modal-cancel-btn" onclick="cancelEdit()">Cancel</button>
    </div>
  </div>
</div>

<script>
  const $ = id => document.getElementById(id);
  let allNotes = [];
  let currentCat = 'all';
  let currentSubcat = 'all';
  let currentTag = null;

  const SUBCATS = {
    psychiatry:    ['DSM-5','Medications','Assessments','Treatments','Lab Values','Neuroscience','Ethics & Law','Board Prep'],
    psychotherapy: ['CBT','DBT','ACT','Psychodynamic','Motivational Interviewing','Trauma-Focused','Family & Couples','Group Therapy','Theory & Foundations'],
    icu:           ['Neuro','Respiratory','Cardiac','GI','Renal','Hematology','Pharmacology','Procedures','Protocols & Guidelines'],
    business:      ['Licensing','Credentialing','Billing & Insurance','Marketing','Platforms','Legal'],
    resources:     ['Contacts','URLs & Links','Books','Courses','Tools','Future Ideas'],
    personal:      ['Reflections','Goals','Mental Health','Gratitude','Journal','Relationships'],
    lifestyle:     ['Daily Log','Diet','Health','Fitness','Closet','Travel','Finance','Home','Gardening']
  };

  // ── Profile ───────────────────────────────────────────────────────────
  const PROFILE_SECTIONS = [
    { key:'about',    icon:'👤', title:'About Me',              placeholder:'Name, age, occupation, family, location...' },
    { key:'health',   icon:'🏥', title:'Health & Medical',      placeholder:'Conditions, medications, injuries, allergies...' },
    { key:'nutrition',icon:'🥗', title:'Nutrition Goals',       placeholder:'Diet preferences, goals, restrictions, allergies...' },
    { key:'fitness',  icon:'💪', title:'Fitness & Activity',    placeholder:'Activity level, workout routine, fitness goals...' },
    { key:'career',   icon:'💼', title:'Career & Business',     placeholder:'Current role, business goals, projects, milestones...' },
    { key:'personal', icon:'🌱', title:'Personal Values & Goals',placeholder:'What matters to you, life goals, values, beliefs...' },
    { key:'routines', icon:'🌅', title:'Daily Routines',        placeholder:'Morning routine, sleep schedule, habits...' }
  ];

  async function loadProfile() {
    const res = await fetch('/profile');
    if(res.status===401){location.reload();return;}
    const data = await res.json();
    const list = $('profile-list');
    list.innerHTML = PROFILE_SECTIONS.map(s => `
      <div class="profile-card" id="pc-${s.key}">
        <div class="profile-card-header">
          <div style="display:flex;align-items:center;gap:8px">
            <span class="profile-section-icon">${s.icon}</span>
            <span class="profile-section-title">${s.title}</span>
          </div>
          <button class="profile-edit-btn" onclick="editProfileSection('${s.key}')">Edit</button>
        </div>
        <div class="profile-content ${data[s.key]?'':'empty'}" id="pv-${s.key}">${data[s.key] ? renderContent(data[s.key]) : 'Tap Edit to add...'}</div>
        <textarea class="profile-edit-area" id="pa-${s.key}" placeholder="${s.placeholder}">${data[s.key]||''}</textarea>
        <div class="profile-btn-row" id="pb-${s.key}">
          <button class="profile-save-btn" onclick="saveProfileSection('${s.key}')">Save</button>
          <button class="profile-cancel-btn" onclick="cancelProfileEdit('${s.key}')">Cancel</button>
        </div>
      </div>`).join('');
  }

  function editProfileSection(key) {
    document.getElementById(`pa-${key}`).style.display = 'block';
    document.getElementById(`pb-${key}`).style.display = 'flex';
    document.getElementById(`pa-${key}`).focus();
  }

  function cancelProfileEdit(key) {
    document.getElementById(`pa-${key}`).style.display = 'none';
    document.getElementById(`pb-${key}`).style.display = 'none';
  }

  async function saveProfileSection(key) {
    const content = document.getElementById(`pa-${key}`).value.trim();
    const res = await fetch('/profile', {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({section: key, content})
    });
    if(res.ok) {
      const view = document.getElementById(`pv-${key}`);
      view.innerHTML = content ? renderContent(content) : 'Tap Edit to add...';
      view.className = `profile-content ${content?'':'empty'}`;
      cancelProfileEdit(key);
    }
  }

  // ── Auth ──────────────────────────────────────────────────────────────
  async function doLogin() {
    const res = await fetch('/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({password: $('pw-input').value})
    });
    if (res.ok) { $('login-screen').style.display='none'; $('app').style.display='flex'; loadNotes(); loadProfile(); loadDashboard(); }
    else $('login-error').style.display='block';
  }
  async function doLogout() {
    await fetch('/logout', {method:'POST'}); location.reload();
  }
  $('pw-input').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
  (async()=>{ const r=await fetch('/notes?limit=1'); if(r.ok){$('login-screen').style.display='none';$('app').style.display='flex';loadNotes();loadProfile();loadDashboard();}})();

  async function loadDashboard() {
    const now = new Date();
    $('dash-date').textContent = now.toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
    try {
      const r = await fetch('/stats');
      if(!r.ok) return;
      const data = await r.json();
      const catLabels = {psychiatry:'Psychiatry', psychotherapy:'Psychotherapy', icu:'ICU', business:'Business', resources:'Resources', personal:'Personal', lifestyle:'Lifestyle'};
      const catColors = {psychiatry:'var(--psychiatry)', psychotherapy:'var(--psychotherapy)', icu:'var(--icu)', business:'var(--business)', resources:'var(--resources)', personal:'var(--personal)', lifestyle:'var(--lifestyle)'};
      const chips = data.by_category
        .filter(c => c.category in catLabels)
        .map(c => `<div class="stat-chip" onclick="jumpToCategory('${c.category}')" style="border-color:${catColors[c.category]};color:${catColors[c.category]}"><span style="color:${catColors[c.category]}">${c.count}</span> ${catLabels[c.category]}</div>`)
        .join('');
      $('dash-stats').innerHTML = `<div class="stat-chip all" onclick="jumpToCategory('all')"><span>${data.total}</span> total notes</div>` + chips;
    } catch(e) { $('dash-stats').innerHTML = ''; }

    // Load rotating quote from personal notes
    try {
      const r2 = await fetch('/notes?category=personal&limit=50');
      if(!r2.ok) return;
      const notes = await r2.json();
      const quoteNotes = notes.filter(n => n.content && n.content.length > 20);
      if(quoteNotes.length > 0) {
        const pick = quoteNotes[Math.floor(Math.random() * quoteNotes.length)];
        // Extract first meaningful sentence
        const text = pick.content.replace(/<[^>]+>/g,'').split(/[.\n]/)[0].trim();
        if(text.length > 15) {
          $('dash-quote').textContent = `"${text}"`;
          $('dash-quote').style.display = 'block';
        }
      }
    } catch(e) {}
  }

  function jumpToCategory(cat) {
    showTab('notes');
    filterNotes(cat);
  }

  // ── Tabs ──────────────────────────────────────────────────────────────
  function showTab(tab) {
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    $(`${tab}-page`).classList.add('active');
    const idx = tab==='chat'?0:tab==='notes'?1:2;
    document.querySelectorAll('.tab')[idx].classList.add('active');
    if(tab==='notes') { clearTagFilter(); loadNotes(); }
    if(tab==='profile') loadProfile();
  }

  // ── Notes ─────────────────────────────────────────────────────────────
  async function loadNotes() {
    $('notes-list').innerHTML = '<div class="loading-notes">Loading your notes...</div>';
    try {
      const res = await fetch('/notes?limit=200');
      if(res.status===401){location.reload();return;}
      allNotes = await res.json();
      renderNotes();
    } catch(e) {
      $('notes-list').innerHTML = '<div class="loading-notes">Could not load notes.</div>';
    }
  }

  function filterNotes(cat) {
    currentCat = cat;
    currentSubcat = 'all';
    document.querySelectorAll('.cat-pill').forEach(p=>{
      p.classList.toggle('active', p.dataset.cat===cat);
    });
    const row = $('subcat-row');
    if(cat !== 'all' && SUBCATS[cat]) {
      const subs = SUBCATS[cat];
      row.innerHTML = `<div class="subcat-pill active" onclick="filterSubcat('all')">All</div>` +
        subs.map(s=>`<div class="subcat-pill" onclick="filterSubcat('${s}')">${s}</div>`).join('');
      row.classList.add('visible');
    } else {
      row.innerHTML = '';
      row.classList.remove('visible');
    }
    renderNotes();
  }

  function filterSubcat(sub) {
    currentSubcat = sub;
    document.querySelectorAll('.subcat-pill').forEach(p=>{
      p.classList.toggle('active', p.textContent===sub || (sub==='all' && p.textContent==='All'));
    });
    renderNotes();
  }

  function filterByTag(tag, e) {
    if(e) e.stopPropagation();
    currentTag = tag;
    currentCat = 'all';
    currentSubcat = 'all';
    document.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.cat-pill')[0].classList.add('active');
    $('subcat-row').innerHTML=''; $('subcat-row').classList.remove('visible');
    $('tag-filter-label').textContent = `Tag: ${tag}`;
    $('tag-filter-bar').classList.add('visible');
    renderNotes();
  }

  function clearTagFilter() {
    currentTag = null;
    $('tag-filter-bar').classList.remove('visible');
    renderNotes();
  }

  function renderNotes() {
    let filtered = currentCat==='all' ? allNotes : allNotes.filter(n=>n.category===currentCat);
    if(currentSubcat !== 'all') {
      const sub = currentSubcat.toLowerCase();
      filtered = filtered.filter(n=> n.subcategory && n.subcategory.toLowerCase() === sub);
    }
    if(currentTag) {
      filtered = filtered.filter(n=> tryParse(n.tags).map(t=>t.toLowerCase()).includes(currentTag.toLowerCase()));
    }
    $('notes-count').textContent = `${filtered.length} note${filtered.length!==1?'s':''}`;

    if(!filtered.length) {
      $('notes-list').innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>No ${currentCat==='all'?'':currentCat+' '}notes yet.<br>Tell Brain something to save it here.</p></div>`;
      return;
    }

    $('notes-list').innerHTML = filtered.map((n,i) => {
      const tags = tryParse(n.tags);
      const date = new Date(n.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric'});
      return `<div class="note-card" onclick="openNote(${i})">
        <div class="note-card-header">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <span class="badge ${n.category}">${n.category}</span>
            ${n.subcategory?`<span style="font-size:11px;color:var(--muted);font-weight:600">· ${esc(n.subcategory)}</span>`:''}
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="note-date">${date}</span>
            <button class="delete-btn" onclick="deleteNote(event,${n.id})" title="Delete">🗑</button>
          </div>
        </div>
        <div class="note-summary">${esc(n.summary||'Note')}</div>

        <div class="note-content">${renderContent(n.content)}</div>
        ${tags.length?`<div class="note-tags">${tags.map(t=>`<span class="tag" onclick="filterByTag('${esc(t)}',event)">${esc(t)}</span>`).join('')}</div>`:''}
      </div>`;
    }).join('');

    // re-index for modal (filtered array)
    window._filteredNotes = filtered;
  }

  function openNote(i) {
    const n = window._filteredNotes[i];
    window._openNote = n;
    const tags = tryParse(n.tags);
    const date = new Date(n.created_at).toLocaleDateString('en-US',{weekday:'short',month:'long',day:'numeric',year:'numeric'});
    $('modal-badge').className = `badge ${n.category}`;
    $('modal-badge').textContent = n.category;
    $('modal-date').textContent = date;
    $('modal-title').textContent = n.summary || 'Note';
    $('modal-body').innerHTML = renderContent(n.content);
    $('modal-tags').innerHTML = tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('');
    $('modal-view').style.display = 'block';
    $('modal-edit').style.display = 'none';
    $('note-modal').classList.add('open');
  }

  function closeModal() { $('note-modal').classList.remove('open'); }
  $('note-modal').addEventListener('click', e=>{ if(e.target===$('note-modal')) closeModal(); });

  async function deleteNote(e, id) {
    e.stopPropagation();
    if(!confirm('Delete this note? This cannot be undone.')) return;
    const res = await fetch(`/notes/${id}`, {method:'DELETE'});
    if(res.ok) { closeModal(); loadNotes(); }
    else alert('Could not delete note. Try again.');
  }

  function updateSubcatOptions() {
    const cat = $('edit-category').value;
    const subs = SUBCATS[cat] || [];
    $('edit-subcategory').innerHTML = '<option value="">— None —</option>' +
      subs.map(s=>`<option value="${s}">${s}</option>`).join('');
  }

  function fmt(type) {
    document.execCommand(type);
    $('edit-content').focus();
  }
  function fmtColor(color) {
    document.execCommand('foreColor', false, color);
    $('edit-content').focus();
  }
  function fmtHighlight(color) {
    document.execCommand('hiliteColor', false, color);
    $('edit-content').focus();
  }
  function fmtSize(size) {
    if(size) document.execCommand('fontSize', false, size);
    $('edit-content').focus();
  }
  function fmtFont(font) {
    if(font) document.execCommand('fontName', false, font);
    $('edit-content').focus();
  }

  // Strip external formatting on paste — keep plain text only
  $('edit-content').addEventListener('paste', e => {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData('text/plain');
    document.execCommand('insertText', false, text);
  });

  let _editingNote = null;
  function startEdit() {
    _editingNote = window._openNote;
    $('edit-summary').value = _editingNote.summary || '';
    $('edit-category').value = _editingNote.category || 'clinical';
    updateSubcatOptions();
    $('edit-subcategory').value = _editingNote.subcategory || '';
    $('edit-content').innerHTML = renderContent(_editingNote.content || '');
    $('modal-view').style.display = 'none';
    $('modal-edit').style.display = 'block';
    $('edit-content').focus();
  }
  function cancelEdit() {
    $('modal-edit').style.display = 'none';
    $('modal-view').style.display = 'block';
  }
  async function saveEdit() {
    const summary = $('edit-summary').value.trim();
    const category = $('edit-category').value;
    const subcategory = $('edit-subcategory').value;
    const content = $('edit-content').innerHTML.trim();
    if(!content || content === '<br>') { alert('Content cannot be empty.'); return; }
    const res = await fetch(`/notes/${_editingNote.id}`, {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({summary, content, category, subcategory})
    });
    if(res.ok) {
      closeModal();
      loadNotes();
    } else {
      alert('Could not save changes. Try again.');
    }
  }

  // ── Chat ──────────────────────────────────────────────────────────────
  const input = $('input');
  input.addEventListener('input',()=>{
    input.style.height='auto';
    input.style.height=Math.min(input.scrollHeight,120)+'px';
    $('send-btn').disabled=!input.value.trim();
  });
  input.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} });

  function timeStr(){ return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }

  function appendMessage(role,text){
    const msgs=$('messages'), div=document.createElement('div');
    div.className=`msg ${role}`;
    const bubble=document.createElement('div'); bubble.className='bubble'; bubble.textContent=text;
    const meta=document.createElement('div'); meta.className='msg-meta';
    meta.textContent=role==='user'?`You · ${timeStr()}`:`Brain · ${timeStr()}`;
    div.appendChild(bubble); div.appendChild(meta);
    msgs.appendChild(div); msgs.scrollTop=msgs.scrollHeight;
  }

  function showTyping(){
    const msgs=$('messages'),div=document.createElement('div');
    div.className='msg brain typing'; div.id='typing-indicator';
    div.innerHTML='<div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    msgs.appendChild(div); msgs.scrollTop=msgs.scrollHeight;
  }
  function removeTyping(){ const t=$('typing-indicator'); if(t)t.remove(); }

  let sending=false;

  // ── File upload ───────────────────────────────────────────────────────
  let _attachedFile = null;

  function handleFileSelect(file) {
    if(!file) return;
    _attachedFile = file;
    $('file-name').textContent = `📄 ${file.name}`;
    $('file-preview').style.display = 'flex';
    $('send-btn').disabled = false;
  }

  async function startQuiz(forceTopic) {
    const topic = forceTopic || $('input').value.trim() || null;
    $('input').value = '';
    $('input').style.height = 'auto';
    $('send-btn').disabled = true;
    const label = forceTopic ? `Quiz me on ${forceTopic}` : (topic ? `Quiz me on ${topic}` : 'Quiz me');
    appendMessage('user', label);
    showTyping();
    try {
      const r = await fetch('/quiz', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({topic})
      });
      const data = await r.json();
      removeTyping();
      const msgs = $('messages'), div = document.createElement('div');
      div.className = 'msg brain';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = renderContent(data.reply);
      const meta = document.createElement('div');
      meta.className = 'msg-meta';
      meta.textContent = `Brain · ${timeStr()}`;
      div.appendChild(bubble); div.appendChild(meta);
      msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight;
    } catch(e) {
      removeTyping();
      appendMessage('brain', 'Something went wrong — try again.');
    }
  }

  function clearFile() {
    _attachedFile = null;
    $('file-input').value = '';
    $('file-preview').style.display = 'none';
    $('send-btn').disabled = !$('input').value.trim();
  }

  // Paste screenshot support (Cmd+V from Arc or anywhere)
  document.addEventListener('paste', e => {
    if($('chat-page').classList.contains('active')) {
      const items = e.clipboardData?.items;
      if(!items) return;
      for(const item of items) {
        if(item.type.startsWith('image/')) {
          const file = item.getAsFile();
          if(file) {
            const named = new File([file], 'screenshot.png', {type: file.type});
            handleFileSelect(named);
          }
          break;
        }
      }
    }
  });

  async function sendMessage(){
    const text = input.value.trim();
    if((!text && !_attachedFile) || sending) return;
    sending = true; input.value = ''; input.style.height = 'auto'; $('send-btn').disabled = true;

    const displayText = text || (_attachedFile ? `📎 ${_attachedFile.name}` : '');
    appendMessage('user', displayText);
    showTyping();

    try {
      let res, data;
      if(_attachedFile) {
        const form = new FormData();
        form.append('file', _attachedFile);
        form.append('note', text);
        res = await fetch('/upload', {method:'POST', body: form});
        clearFile();
      } else {
        const localDate = new Date().toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
        res = await fetch('/chat', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({message: text, local_date: localDate})});
      }
      removeTyping();
      if(res.status === 401) { location.reload(); return; }
      data = await res.json();
      appendMessage('brain', data.reply);
      fetch('/notes?limit=200').then(r=>r.json()).then(n=>{allNotes=n;});
    } catch(e) {
      removeTyping();
      appendMessage('brain', 'Something went wrong. Please try again.');
    } finally {
      sending = false; input.focus();
    }
  }

  // ── Helpers ───────────────────────────────────────────────────────────
  function tryParse(s){ try{ const r=JSON.parse(s); return Array.isArray(r)?r:[]; }catch{return [];} }
  function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
  function stripHtml(s){ const d=document.createElement('div'); d.innerHTML=s||''; return d.textContent||''; }

  function renderContent(s) {
    if(!s) return '';
    // If already HTML (from rich text editor), return as-is
    if(/<[a-z][\s\S]*>/i.test(s)) return s;
    // Otherwise convert markdown to HTML
    return s
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,'<em>$1</em>')
      .replace(/^#{1,3}\s+(.+)$/gm,'<strong>$1</strong>')
      .replace(/^[-•]\s+(.+)$/gm,'&bull; $1')
      .replace(/\n/g,'<br>');
  }
</script>
